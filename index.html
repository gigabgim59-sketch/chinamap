  .cn-zoom{position:absolute;left:12px;top:12px;display:flex;flex-direction:column;gap:4px}

        <g class="cn-item" data-name="중국 본토 (중원)" data-han="中國 · 中原" data-era="지리" data-desc="히말라야·파미르에서 태평양까지. 서북의 타클라마칸에서 동북의 흑룡강, 남단의 남해까지 대륙 본토. 신강 위구르 자치구(서역)·티베트(청장)·내몽골·만주·화북·화중·화남의 7개 지리 대구역으로 구분. '중원(中原)'은 좁게는 황하 중하류의 화북평원, 넓게는 이 대륙 전체를 가리키며 화하 문명의 무대.">

<script>
(function(){
  const NS='http://www.w3.org/2000/svg';
  function el(tag,attrs){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
  function txt(x,y,s,opts){
    const t=el('text',{x,y,'font-size':opts.size||11,'font-weight':opts.weight||600,fill:opts.color||'#333',stroke:'#fff','stroke-width':opts['stroke-width']||2.8,'paint-order':'stroke'});

  }
  function group(d,tier){
    const g=el('g',{class:'cn-item'});
    g.dataset.name=d.n;g.dataset.han=d.h||'';g.dataset.era=d.e||'';g.dataset.desc=d.d||'';g.dataset.type=d.t||'';g.dataset.tier=tier||d.tier||2;
    return g;

  const SEAS=[
    {n:'황해',h:'黃海',e:'한반도-중국 해로',d:"한반도와 중국 산동·강소 사이의 반폐쇄해. 평균 수심 44m로 얕음. 백제·신라·발해가 이 바다를 건너 당·송과 왕래. 원 세조의 두 차례 일본 원정(1274·1281) 출발점. 명·청대 조선 사행 항로. 청일전쟁 황해해전(1894)에서 북양함대 궤멸.",rx:648,ry:290,rw:105,rh:100,lx:695,ly:340,ls:12,tier:2},
    {n:'발해',h:'渤海',e:'화북-요동 만',d:"화북·요동·산동에 둘러싸인 반폐쇄만. 진 시황·한 무제가 방사(方士)를 시켜 봉래·방장·영주 삼신산 불사약을 구하게 한 신화의 바다. 원·명·청대 대운하와 연결된 조운의 해로. 발해국(698~926)의 이름도 여기서 유래.",rx:585,ry:252,rw:52,rh:32,lx:610,ly:272,ls:10,tier:2},
    {n:'동중국해',h:'東海',e:'중국-일본-류큐',d:"중국·한반도 남부·류큐·대만 사이 해역. 감진 화상이 6차 시도 끝에 여기를 건너 일본으로(753). 명대 왜구 활동의 무대. 정화 원정대의 첫 출발지. 현재 중일 조어도(센카쿠) 영유권 분쟁 수역.",rx:660,ry:390,rw:130,rh:70,lx:700,ly:420,ls:11,tier:2},
    {n:'남중국해',h:'南海',e:'해상 실크로드',d:"중국 남부·베트남·필리핀·인도네시아 사이. 광주·천주·명주에서 출발한 상선이 향료·향목·상아를 실어온 해상 실크로드의 핵심. 명대 정화 원정의 주요 항로 — 인도양·아프리카 동안까지. 현재 9단선을 둘러싼 다국 영유권 분쟁.",rx:400,ry:520,rw:250,rh:38,lx:550,ly:540,ls:11,tier:2}

  const seasG=document.getElementById('cn-seas');
  SEAS.forEach(s=>{

    seasG.appendChild(g);
  });

  const TERRAINS=[
    {n:'청장고원',h:'靑藏高原',e:'평균 해발 4,000m+',d:"'세계의 지붕'. 250만 km²로 세계 최대·최고 고원. 황하·장강·메콩·인더스·갠지스 6대 강 발원지. 토번(吐蕃, 7~9세기) 근거지 — 당과 대등하게 겨루며 문성공주 하가. 원·청대 편입.",p:'M 100,235 Q 88,300 128,342 Q 180,362 240,342 Q 282,320 275,268 Q 258,218 198,213 Q 138,208 100,235 Z',fill:'#e8dcc0',stroke:'#b8a075',lx:180,ly:290,lc:'#7a6a3a',ls:12},
    {n:'황토고원',h:'黃土高原',e:'화하 문명의 요람',d:"바람에 쌓인 황토 100~300m 두께. 부드럽고 비옥해 초기 농경에 유리. 반파·앙소 문화, 주·진의 발상지. 요동(窯洞, 굴집) 주거. 황하 황토의 공급지.",p:'M 320,190 Q 300,220 315,258 Q 350,278 395,262 Q 420,232 405,198 Q 380,175 340,180 Q 325,183 320,190 Z',fill:'#efdcae',stroke:'#c9a24a',lx:355,ly:230,lc:'#8a5f1a',ls:12},
    {n:'화북평원',h:'華北平原',e:'30만 km²',d:"황하·회하·해하가 만든 대충적평원. 밀·조·목화 주산지. 인구 밀집. 낙양·개봉·업성·은허 등 주요 도읍이 모두 여기 위치. 황하 범람이 잦은 재해지.",p:'M 435,232 Q 425,285 460,320 Q 510,335 555,318 Q 590,298 585,258 Q 560,222 510,218 Q 465,220 435,232 Z',fill:'#e8ecd0',stroke:'#a3b579',lx:510,ly:278,lc:'#5a7a2a',ls:11},
    {n:'강남',h:'江南',e:'남송 이후 경제 중심',d:"장강 하류 삼각주와 태호 유역. 벼 이모작, 비단·차·자기 주산지. 남송 이후 경제·문화 중심이 화북에서 여기로 이동. '소호숙 천하족(蘇湖熟 天下足)'.",p:'M 500,362 Q 490,408 528,428 Q 582,438 618,418 Q 620,395 610,362 Q 572,346 532,352 Q 505,355 500,362 Z',fill:'#dcead0',stroke:'#8fa668',lx:560,ly:393,lc:'#5a7a2a',ls:11},
    {n:'타클라마칸 사막',h:'塔克拉瑪干沙漠',e:'33만 km²',d:"타림분지 중앙. 위구르어로 '들어가면 나오지 못한다'. 세계 2위 이동사막. 실크로드는 남·북연을 우회. 오아시스 국가(누란·소륵·구자) 번영.",p:'M 128,178 Q 112,215 148,235 Q 200,235 240,213 Q 250,188 220,168 Q 178,158 148,166 Q 133,170 128,178 Z',fill:'#f0e4c4',stroke:'#b8a06a',lx:185,ly:205,lc:'#8a6a30',ls:10},

    {t:'mtn',tier:3,x:528,y:255,n:'태산',h:'泰山 (1,545m)',e:'오악의 으뜸',d:"산동. 오악 중 동악. 진 시황부터 청 강희·건륭까지 12명의 황제가 봉선 의식. 공자 '등태산이소천하'. 세계자연·문화 이중유산."},
    {t:'mtn',tier:3,x:413,y:245,n:'화산',h:'華山',e:'오악의 서악',d:"섬서 위남. 화강암 절벽 5개 봉우리로 '천하제일험'. 도교 성지."},

  const cities=document.getElementById('cn-cities'),mountains=document.getElementById('cn-mountains'),forts=document.getElementById('cn-forts');
  const styles={cap:{fill:'#b85450',r:6.5,tsize:12.5,tw:700,tc:'#3a1810'},city:{fill:'#d97e3a',r:4.8,tsize:11,tw:600,tc:'#5a3210'},silk:{fill:'#3a9080',r:4.5,tsize:11,tw:600,tc:'#0e5c4a'},fort:{fill:'#5a4a70',r:0,tsize:10.5,tw:700,tc:'#2a1e40'},mtn:{fill:'#7a6a45',r:0,tsize:10,tw:600,tc:'#4d3f22'},lake:{fill:'#7ba8c9',r:0,tsize:10,tw:600,tc:'#2a5f80'}};

    const s=styles[c.t],g=group(c,c.tier);
    if(c.t==='mtn')g.appendChild(el('path',{d:`M ${c.x-7},${c.y+5} L ${c.x},${c.y-7} L ${c.x+7},${c.y+5} Z`,fill:s.fill,stroke:'#fff','stroke-width':1}));

    if(c.t==='mtn'||c.t==='lake')mountains.appendChild(g);

    else cities.appendChild(g);
  });

  const panel=document.getElementById('cn-panel'),pName=document.getElementById('cn-p-name'),pHan=document.getElementById('cn-p-han'),pTags=document.getElementById('cn-p-tags'),pDesc=document.getElementById('cn-p-desc');
  const typeLabel={cap:'도읍',city:'주요 도시',silk:'실크로드 관문',fort:'성·관문',mtn:'산·산맥',lake:'호수',river:'강',wall:'구조물',terrain:'지형',sea:'바다','':'지역'};
  function openPanel(el){
    const d=el.dataset;
    pName.textContent=d.name||'';pHan.textContent=d.han||'';
    let ttype=d.type;
    if(!ttype){const layer=el.closest('.cn-layer')?.dataset.layer;if(layer==='rivers')ttype='river';else if(layer==='wall')ttype='wall';else if(layer==='terrain')ttype='terrain';else if(layer==='seas')ttype='sea';}
    pTags.innerHTML=`<span class="tag">${typeLabel[ttype]||''}</span>${d.era?`<span class="tag era">${d.era}</span>`:''}`;
    pDesc.textContent=d.desc||'';panel.classList.add('show');
  }
  document.getElementById('cn-viewport').addEventListener('click',e=>{if(justDragged){justDragged=false;return;}const it=e.target.closest('.cn-item');if(it){e.stopPropagation();openPanel(it);}});
  document.getElementById('cn-close').addEventListener('click',()=>panel.classList.remove('show'));

    ssong:{n:'南宋 남송',c:'#7a5aa8',y:'1127 ~ 1279 · 152년',d:'회하 이남으로 축소. 임안 도읍. 진령-회하선이 금과의 국경. 성리학 완성(주희). 몽골에 40년 저항(양양·조어). 1279년 애산 해전에서 육수부·문천상 순사.',p:'M 260,325 L 305,290 L 400,290 L 495,315 L 555,330 L 605,375 L 605,410 L 555,440 L 495,465 L 400,470 L 335,450 L 295,410 L 270,365 Z'},

  const dynPath=document.getElementById('cn-dynasty'),dynInfo=document.getElementById('cn-dyn-info');
  document.querySelectorAll('.cn-dyn-bar button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.cn-dyn-bar button').forEach(x=>{x.style.background='';x.style.color='';x.style.borderColor='';});
      const k=b.dataset.dyn;
      if(k==='none'){dynPath.setAttribute('d','');dynPath.setAttribute('fill','none');dynPath.setAttribute('stroke','none');dynInfo.classList.remove('show');dynInfo.innerHTML='';b.style.background='#3a3226';b.style.color='#f5efe0';}
      else{const D=DYN[k];dynPath.setAttribute('d',D.p);dynPath.setAttribute('fill',D.c);dynPath.setAttribute('stroke',D.c);dynPath.setAttribute('stroke-width',2);dynPath.setAttribute('opacity',0.42);b.style.background=D.c;b.style.color='#fff';b.style.borderColor=D.c;dynInfo.innerHTML=`<b>${D.n}</b><span class="yr">${D.y}</span><div style="margin-top:6px">${D.d}</div>`;dynInfo.classList.add('show');}
    });
  });

  document.querySelectorAll('.cn-toolbar button[data-layer]').forEach(b=>{
    b.addEventListener('click',()=>{b.classList.toggle('active');const key=b.dataset.layer;document.querySelectorAll(`.cn-layer[data-layer="${key}"]`).forEach(g=>{g.style.display=b.classList.contains('active')?'':'none';});});
  });
  const wrap=document.getElementById('cn-wrap');
  document.querySelectorAll('.cn-mode-bar button').forEach(b=>{
    b.addEventListener('click',()=>{document.querySelectorAll('.cn-mode-bar button').forEach(x=>x.classList.remove('active'));b.classList.add('active');wrap.classList.remove('mode-core','mode-std','mode-detail');wrap.classList.add('mode-'+b.dataset.mode);});
  });

  const svg=document.getElementById('cn-svg');
  let vx=0,vy=0,vw=800,vh=560;
  function setView(){svg.setAttribute('viewBox',`${vx} ${vy} ${vw} ${vh}`);}
  document.getElementById('cn-in').addEventListener('click',()=>{const cx=vx+vw/2,cy=vy+vh/2;vw*=0.7;vh*=0.7;vx=cx-vw/2;vy=cy-vh/2;setView();});
  document.getElementById('cn-out').addEventListener('click',()=>{const cx=vx+vw/2,cy=vy+vh/2;vw=Math.min(800,vw/0.7);vh=Math.min(560,vh/0.7);vx=cx-vw/2;vy=cy-vh/2;setView();});
  document.getElementById('cn-reset').addEventListener('click',()=>{vx=0;vy=0;vw=800;vh=560;setView();});

  let mightDrag=false,dragging=false,justDragged=false,sx=0,sy=0,startVx=0,startVy=0,activePointer=null;
  svg.addEventListener('pointerdown',e=>{mightDrag=true;dragging=false;justDragged=false;sx=e.clientX;sy=e.clientY;startVx=vx;startVy=vy;activePointer=e.pointerId;});
  svg.addEventListener('pointermove',e=>{if(!mightDrag)return;const dx=Math.abs(e.clientX-sx),dy=Math.abs(e.clientY-sy);if(!dragging&&dx+dy>5){dragging=true;svg.classList.add('dragging');try{svg.setPointerCapture(e.pointerId);}catch(_){}}if(dragging){const r=svg.getBoundingClientRect();const scale=vw/r.width;vx=startVx-(e.clientX-sx)*scale;vy=startVy-(e.clientY-sy)*scale;setView();}});
  function endDrag(){if(dragging)justDragged=true;mightDrag=false;dragging=false;svg.classList.remove('dragging');if(activePointer!==null){try{svg.releasePointerCapture(activePointer);}catch(_){}activePointer=null;}}
  svg.addEventListener('pointerup',endDrag);svg.addEventListener('pointercancel',endDrag);
  svg.addEventListener('wheel',e=>{e.preventDefault();const r=svg.getBoundingClientRect();const mx=vx+(e.clientX-r.left)/r.width*vw;const my=vy+(e.clientY-r.top)/r.height*vh;const k=e.deltaY<0?0.85:1/0.85;vw*=k;vh*=k;vx=mx-(e.clientX-r.left)/r.width*vw;vy=my-(e.clientY-r.top)/r.height*vh;setView();},{passive:false});

  const noneBtn=document.querySelector('.cn-dyn-bar button[data-dyn="none"]');noneBtn.style.background='#3a3226';noneBtn.style.color='#f5efe0';
})();
</script>
